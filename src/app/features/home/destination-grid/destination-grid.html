<section class="relative overflow-hidden">
  <div class="max-w-7xl mx-auto px-margin-mobile md:px-8">
    <div class="flex flex-col lg:flex-row lg:items-end lg:justify-between mb-14">
      <div>
        <span class="text-xs uppercase tracking-[0.2em] text-brand-teal font-semibold">Curated Collections</span>
        <div class="w-12 h-0.5 bg-brand-teal mt-3 mb-5"></div>
        <h2 class="text-4xl lg:text-5xl font-extrabold leading-tight text-on-surface">Featured Destinations</h2>
      </div>
      <a class="mt-6 lg:mt-0 inline-flex items-center gap-2 text-brand-teal font-semibold text-sm group shrink-0" href="#">
        View All Destinations
        <span class="group-hover:translate-x-1 transition-transform">→</span>
      </a>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-5" style="min-height: 350px;">
      @if (featured) {
        <div class="lg:col-span-7 lg:row-span-2 relative overflow-hidden rounded-[32px] group cursor-pointer">
          <img
            [src]="featured.image"
            [alt]="featured.name"
            class="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-700"
          />
          <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/10 to-transparent"></div>
          <div class="absolute inset-0 bg-gradient-to-br from-brand-teal/10 to-transparent mix-blend-overlay"></div>
          <div class="relative h-full flex flex-col justify-end p-8 lg:p-10">
            <span class="text-[10px] uppercase tracking-[0.2em] text-brand-teal font-semibold mb-3">{{ featured.tag }}</span>
            <h3 class="text-2xl lg:text-3xl font-bold text-white">{{ featured.name }}</h3>
            @if (featured.description) {
              <p class="mt-2 text-white/60 text-sm max-w-md leading-relaxed">{{ featured.description }}</p>
            }
            <div class="mt-5 flex items-center gap-2 text-white/40 text-xs opacity-0 group-hover:opacity-100 transition-all duration-300 translate-y-2 group-hover:translate-y-0">
              <span class="text-brand-teal font-semibold">Explore Destination</span>
              <span class="text-brand-teal">→</span>
            </div>
          </div>
        </div>
      }

      <div class="lg:col-span-5 lg:row-span-2 grid grid-cols-2 gap-5">
        @for (dest of small; track dest.id) {
          <div class="relative overflow-hidden rounded-[24px] group cursor-pointer">
            <img
              [src]="dest.image"
              [alt]="dest.name"
              class="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-700"
            />
            <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/10 to-transparent"></div>
            <div class="relative h-full flex flex-col justify-end p-5">
              <span class="text-[9px] uppercase tracking-[0.2em] text-brand-teal font-semibold mb-1">{{ dest.tag }}</span>
              <h4 class="text-sm font-bold text-white">{{ dest.name }}</h4>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</section>
