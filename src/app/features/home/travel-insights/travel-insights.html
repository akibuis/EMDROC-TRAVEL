<section class="py-12 md:py-section-gap bg-surface-bright">
  <div class="max-w-container-max mx-auto px-margin-desktop">
    <div class="flex justify-between items-end mb-stack-lg">
      <div>
        <span class="text-secondary font-label-sm tracking-widest uppercase">Expert Perspective</span>
        <h2 class="font-display-lg text-display-md text-primary mt-2">Travel Insights</h2>
      </div>
      <a class="text-primary font-label-md flex items-center gap-2 group" routerLink="/blog">
        Read Journal <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
      </a>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-gutter">
      @for (post of posts; track post.id) {
        <a [routerLink]="['/blog', post.id]" class="bg-white rounded-xl overflow-hidden shadow-md hover:shadow-xl transition-all group scroll-reveal block">
          <div class="h-56 relative overflow-hidden">
            <div
              class="bg-cover bg-center w-full h-full group-hover:scale-110 transition-transform duration-500"
              [style.background-image]="'url(' + post.image + ')'"
            ></div>
            <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded font-label-sm text-primary">{{ post.category }}</div>
          </div>
          <div class="p-6">
            <p class="font-label-sm text-on-surface-variant mb-2">{{ post.date }}</p>
            <h4 class="font-title-lg text-primary mb-3 group-hover:text-secondary transition-colors">{{ post.title }}</h4>
            <p class="text-on-surface-variant font-body-md line-clamp-2">{{ post.excerpt }}</p>
          </div>
        </a>
      }
    </div>
  </div>
</section>
