<section class="py-28 relative overflow-hidden" (mouseenter)="onHover(true)" (mouseleave)="onHover(false)">
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-brand-teal/5 rounded-full blur-3xl"></div>
    <div class="absolute top-0 right-0 w-96 h-96 bg-brand-teal/5 rounded-full blur-3xl"></div>
    <div class="absolute bottom-0 left-0 w-96 h-96 bg-brand-teal/5 rounded-full blur-3xl"></div>
    <div class="absolute top-20 left-10 w-32 h-32 border border-brand-teal/10 rounded-full"></div>
    <div class="absolute bottom-20 right-10 w-48 h-48 border border-brand-teal/10 rounded-full"></div>
  </div>
  <div class="relative max-w-5xl mx-auto px-8">
    <div class="text-center mb-14">
      <span class="text-xs uppercase tracking-[0.2em] text-brand-teal font-semibold">Testimonials</span>
      <div class="w-12 h-0.5 bg-brand-teal mx-auto mt-3 mb-5"></div>
      <h2 class="text-4xl lg:text-5xl font-extrabold leading-tight text-white">What Our Clients Say</h2>
    </div>
    <div class="relative">
      <div class="absolute -top-6 -left-2 text-7xl leading-none text-brand-teal/15 select-none font-serif">&ldquo;</div>
      <div class="absolute -bottom-6 -right-2 text-7xl leading-none text-brand-teal/15 select-none font-serif rotate-180">&rdquo;</div>
      <div class="relative bg-white/[0.03] backdrop-blur-sm rounded-[40px] p-10 md:p-16 border border-white/10 shadow-xl">
        @for (t of [testimonials[activeIndex()]]; track t.id) {
          <div class="slide-in">
            <div class="flex items-center gap-1.5 mb-8">
              @for (star of [1,2,3,4,5]; track star) {
                <svg class="w-5 h-5" [class.text-brand-teal]="star <= t.rating" [class.text-white/20]="star > t.rating" fill="currentColor" viewBox="0 0 20 20">
                  <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
                </svg>
              }
            </div>
            <p class="text-xl md:text-2xl lg:text-3xl font-light leading-relaxed text-white/90 mb-12 text-balance">
              &ldquo;{{ t.text }}&rdquo;
            </p>
            <div class="flex items-center gap-5 pt-8 border-t border-white/10">
              <div class="w-14 h-14 rounded-full bg-gradient-to-br from-brand-teal to-brand-teal/60 flex items-center justify-center text-white font-bold text-lg shrink-0 shadow-lg">
                {{ t.name.charAt(0) }}
              </div>
              <div class="text-left">
                <p class="font-bold text-white text-lg">{{ t.name }}</p>
                <p class="text-sm text-gray-400">{{ t.trip }}</p>
              </div>
              <div class="ml-auto hidden sm:block">
                <svg class="w-12 h-12 text-brand-teal/20" fill="currentColor" viewBox="0 0 24 24"><path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z"/></svg>
              </div>
            </div>
          </div>
        }
      </div>
    </div>
    <div class="flex justify-center gap-3 mt-12">
      @for (t of testimonials; track t.id; let i = $index) {
        <button
          (click)="activeIndex.set(i)"
          class="rounded-full transition-all duration-300"
          [class]="i === activeIndex()
            ? 'w-10 h-2.5 bg-brand-teal'
            : 'w-2.5 h-2.5 bg-white/20 hover:bg-white/40'"
          [attr.aria-label]="'Testimonial ' + (i + 1)"
        ></button>
      }
    </div>
  </div>
</section>
