<section class="hero-section relative min-h-[65vh] flex items-start md:items-center pt-24 md:pt-20 overflow-hidden" data-purpose="hero-container">
  <div class="absolute inset-0 z-0">
    @for (dest of destinations; track dest.id; let i = $index) {
      <div
        class="absolute inset-0 bg-cover bg-center transition-opacity duration-700"
        [style.background-image]="'url(' + dest.backgroundImage + ')'"
        [class.opacity-100]="i === activeIndex()"
        [class.opacity-0]="i !== activeIndex()"
      ></div>
    }
    <div class="absolute inset-0 hero-gradient"></div>
  </div>

  <div class="relative z-10 max-w-7xl mx-auto px-margin-mobile md:px-8 w-full">
    <div class="max-w-2xl space-y-5 md:space-y-8 text-center md:text-left pt-4 md:pt-0">
      <h1 class="text-3xl sm:text-5xl lg:text-6xl font-extrabold leading-tight">
        {{ activeDestination().heroTitle }}<br/>
        <span class="text-brand-teal">{{ activeDestination().heroSubtitle }}</span>
      </h1>
      <p class="text-sm sm:text-base lg:text-lg text-gray-200 max-w-md leading-relaxed mx-auto md:mx-0">
        Unlock the wonders of the world: Your dream trip. Our tours offer a diverse range of destinations that cater to a wide variety of interests.
      </p>
      <div class="flex items-center justify-center md:justify-start gap-4 md:gap-6">
        <button class="bg-brand-teal hover:bg-brand-teal/90 text-white px-6 py-3 md:px-8 md:py-4 rounded-lg font-bold text-sm md:text-lg transition shadow-lg shadow-brand-teal/20">
          Book a Trip
        </button>
        <div class="flex -space-x-3 md:-space-x-4">
          <div class="w-8 h-8 md:w-10 md:h-10 rounded-full border-2 border-brand-dark bg-gray-400 overflow-hidden">
            <img alt="user" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=64&q=80"/>
          </div>
          <div class="w-8 h-8 md:w-10 md:h-10 rounded-full border-2 border-brand-dark bg-gray-500 overflow-hidden">
            <img alt="user" src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=64&q=80"/>
          </div>
          <div class="w-8 h-8 md:w-10 md:h-10 rounded-full border-2 border-brand-dark bg-brand-teal flex items-center justify-center text-[10px] md:text-xs font-bold">+12k</div>
        </div>
      </div>
    </div>
  </div>

  <div class="absolute bottom-0 left-0 w-full z-20 pointer-events-none">
    <svg viewBox="0 0 1440 120" preserveAspectRatio="none" class="w-full h-[120px]">
      <path class="hero-svg-curve" d="M0,40 C240,100 480,-20 720,40 C960,100 1200,-20 1440,40 L1440,120 L0,120 Z" fill="#031D24"></path>
    </svg>
  </div>
</section>
