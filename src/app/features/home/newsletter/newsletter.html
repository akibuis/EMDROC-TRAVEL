<section class="py-10 md:py-20">
  <div class="max-w-7xl mx-auto px-margin-mobile md:px-8">
    <div class="newsletter-card relative rounded-[32px] p-10 md:p-16 flex flex-col md:flex-row items-center justify-between gap-10 overflow-hidden">
      <div class="absolute inset-0 opacity-10 pointer-events-none">
        <div class="w-full h-full bg-cover bg-center" style="background-image: url('/about/lagos-aerial.jpg');"></div>
      </div>
      <div class="absolute top-0 right-0 w-1/2 h-full bg-gradient-to-l from-white/5 to-transparent skew-x-12"></div>
      <div class="absolute -bottom-10 -left-10 w-40 h-40 border border-white/10 rounded-full"></div>
      <div class="absolute -top-10 -right-10 w-60 h-60 border border-white/10 rounded-full"></div>
      <div class="z-10 max-w-xl">
        <h2 class="text-white text-3xl lg:text-4xl font-extrabold mb-4">Stay Ahead of Global Travel Trends</h2>
        <p class="text-white/70 text-lg">Subscribe to our monthly advisory for exclusive destination insights and corporate travel strategies.</p>
      </div>
      <form [formGroup]="newsletterForm" (ngSubmit)="onSubmit()" class="z-10 w-full md:w-auto flex flex-col sm:flex-row gap-4">
        <input
          type="email"
          formControlName="email"
          placeholder="Your work email"
          class="bg-white/10 border border-white/20 text-white placeholder-white/50 rounded-xl px-5 py-4 w-full sm:w-80 focus:outline-none focus:border-white/50"
        />
        <button
          type="submit"
          class="bg-white text-brand-teal font-bold px-8 py-4 rounded-xl hover:scale-105 transition-transform whitespace-nowrap"
        >
          Subscribe
        </button>
      </form>
    </div>
  </div>
</section>
