<main>
  <app-page-header
    title="Travel Insights"
    description="Stay ahead of the curve with our curated selection of industry trends, destination deep-dives, and strategic advisory for the global executive."
    [backgroundImage]="heroImage">
  </app-page-header>

  <section class="blog-filter-bar sticky top-[72px] z-30 py-4 px-margin-mobile md:px-margin-desktop border-b border-[#3d494c]/30" style="background: rgba(9, 35, 42, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);">
    <div class="max-w-[1280px] mx-auto flex flex-col md:flex-row md:items-center gap-3 md:gap-0 md:justify-between">
      <div class="flex items-center gap-3 overflow-x-auto pb-1">
        <button class="bg-[#66d5f1] text-[#003641] font-label-md px-5 py-2 rounded-full whitespace-nowrap">All Insights</button>
        <button class="text-[#bdc8cd] hover:bg-[#203840] hover:text-[#cde7f0] transition-all font-label-md px-5 py-2 rounded-full whitespace-nowrap">Executive Logistics</button>
        <button class="text-[#bdc8cd] hover:bg-[#203840] hover:text-[#cde7f0] transition-all font-label-md px-5 py-2 rounded-full whitespace-nowrap">Destination Spotlights</button>
        <button class="text-[#bdc8cd] hover:bg-[#203840] hover:text-[#cde7f0] transition-all font-label-md px-5 py-2 rounded-full whitespace-nowrap">Industry Trends</button>
        <button class="text-[#bdc8cd] hover:bg-[#203840] hover:text-[#cde7f0] transition-all font-label-md px-5 py-2 rounded-full whitespace-nowrap">Corporate Advisory</button>
      </div>
      <div class="flex items-center gap-2 text-[#bdc8cd] border border-[#3d494c] rounded-full px-4 py-2 hover:border-[#66d5f1] transition-colors cursor-pointer self-start md:self-auto">
        <span class="material-symbols-outlined text-[20px]">search</span>
        <input class="bg-transparent border-none focus:ring-0 text-label-md w-32 md:w-48" style="color: #cde7f0;" placeholder="Search archive..." type="text"/>
      </div>
    </div>
  </section>

  <section class="bg-[#00161d] py-12 md:py-section-gap px-margin-mobile md:px-margin-desktop max-w-[1280px] mx-auto">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-gutter">
      @for (article of articles; track article.id) {
        <a [routerLink]="['/blog', article.id]" class="group bg-[#09232a] rounded-3xl overflow-hidden transition-all duration-300 border border-[#3d494c]/10 hover:translate-y-[-4px] hover:shadow-[0_12px_24px_-8px_rgba(0,104,123,0.3)]">
          <div class="h-64 overflow-hidden relative">
            <div class="w-full h-full bg-cover bg-center group-hover:scale-110 transition-transform duration-700" [style.background-image]="'url(' + article.image + ')'"></div>
            <div class="absolute top-4 left-4">
              <span class="bg-[#00161d]/80 backdrop-blur-md px-3 py-1 rounded-full text-[#66d5f1] font-label-sm">{{ article.category }}</span>
            </div>
          </div>
          <div class="p-8">
            <div class="font-label-sm text-[#bdc8cd]/70 mb-2 uppercase tracking-tighter">{{ article.date }}</div>
            <h3 class="text-headline-md text-[#cde7f0] mb-4 group-hover:text-[#66d5f1] transition-colors">{{ article.title }}</h3>
            <p class="text-body-md text-[#bdc8cd] mb-6 line-clamp-2">{{ article.excerpt }}</p>
            <span class="inline-flex items-center gap-2 text-[#66d5f1] font-label-md group/link">
              Read More
              <span class="material-symbols-outlined text-[18px] group-hover/link:translate-x-1 transition-transform">trending_flat</span>
            </span>
          </div>
        </a>
      }
    </div>

    <div class="mt-section-gap flex justify-center items-center gap-4">
      <button class="w-12 h-12 flex items-center justify-center rounded-full border border-[#3d494c] text-[#bdc8cd] hover:border-[#66d5f1] hover:text-[#66d5f1] transition-all">
        <span class="material-symbols-outlined">chevron_left</span>
      </button>
      <button class="w-12 h-12 flex items-center justify-center rounded-full bg-[#66d5f1] text-[#003641] font-label-md">1</button>
      <button class="w-12 h-12 flex items-center justify-center rounded-full border border-[#3d494c] text-[#bdc8cd] hover:border-[#66d5f1] hover:text-[#66d5f1] transition-all font-label-md">2</button>
      <button class="w-12 h-12 flex items-center justify-center rounded-full border border-[#3d494c] text-[#bdc8cd] hover:border-[#66d5f1] hover:text-[#66d5f1] transition-all font-label-md">3</button>
      <span class="text-[#bdc8cd]">...</span>
      <button class="w-12 h-12 flex items-center justify-center rounded-full border border-[#3d494c] text-[#bdc8cd] hover:border-[#66d5f1] hover:text-[#66d5f1] transition-all">
        <span class="material-symbols-outlined">chevron_right</span>
      </button>
    </div>
  </section>

  <app-cta
    title="Ready to elevate your itinerary?"
    description="Connect with our senior consultants for a bespoke travel strategy session."
    primaryBtnText="Inquire Now"
    secondaryBtnText="View Case Studies"
    secondaryBtnLink="/services"
    bgImage="https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=1920&q=80"
  />
</main>
