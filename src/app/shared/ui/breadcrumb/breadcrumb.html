<section class="relative overflow-hidden bg-gradient-to-br from-[#005f73] to-primary pt-32 pb-12 md:pb-section-gap min-h-[180px] md:min-h-[240px]">
  <!-- Background image -->
  <img
    class="absolute inset-0 w-full h-full object-cover opacity-[0.5]"
    src="/about/lagos-aerial.jpg"
    alt=""
    loading="lazy"
  />

  <!-- Airplane accent -->
  <div class="absolute top-28 right-1/4 text-white/8 rotate-45">
    <span class="material-symbols-outlined" style="font-size: 72px;">flight</span>
  </div>
  <div class="absolute bottom-16 left-1/4 text-white/[0.05] -rotate-12">
    <span class="material-symbols-outlined" style="font-size: 48px;">flight</span>
  </div>

  <div class="relative z-10 max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop flex flex-col justify-end h-full min-h-[120px]">
    <!-- Title -->
    <h1 class="text-white font-display-lg text-display-lg mb-2">{{ title() }}</h1>

    <!-- Subtitle -->
    @if (subtitle()) {
      <p class="text-white/70 font-body-lg text-body-lg max-w-2xl">{{ subtitle() }}</p>
    }
  </div>
</section>
