<nav id="main-nav"
    class="fixed top-0 z-50 flex items-center justify-between transition-all duration-500"
    [class.inset-x-0]="!isScrolled()"
    [class.mx-auto]="!isScrolled()"
    [class.max-w-7xl]="!isScrolled()"
    [class.rounded-full]="!isScrolled()"
    [class.glass-effect]="!isScrolled()"
    [class.px-8]="!isScrolled()"
    [class.py-3]="!isScrolled()"
    [class.mt-4]="!isScrolled()"
    [class.w-full]="isScrolled()"
    [class.bg-brand-dark/60]="isScrolled()"
    [class.backdrop-blur-md]="isScrolled()"
    [class.px-margin-mobile]="isScrolled()"
    [class.md:px-8]="isScrolled()"
    [class.py-4]="isScrolled()"
  >
    <a routerLink="/" class="flex items-center gap-2 shrink-0">
      <img
        src="logo.png"
        alt="EMDROC Logo"
        class="h-10 w-auto"
      />
    </a>
    <ul class="hidden md:flex items-center gap-10 text-sm font-medium tracking-wide uppercase">
      @for (link of navLinks; track link.route) {
        <li>
          <a
            routerLink="{{ link.route }}"
            routerLinkActive="text-brand-teal"
            [routerLinkActiveOptions]="{ exact: link.route === '/' }"
            class="hover:text-brand-teal transition text-white/80"
          >
            {{ link.label }}
          </a>
        </li>
      }
    </ul>
    <div class="flex items-center gap-2">
      <button
        (click)="theme.toggle()"
        class="p-2 rounded-full transition-all duration-300 hover:bg-white/10"
        [attr.aria-label]="theme.isLight() ? 'Switch to dark mode' : 'Switch to light mode'"
      >
        @if (theme.isLight()) {
          <svg class="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/>
          </svg>
        } @else {
          <svg class="w-5 h-5 text-amber-300" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.59a.75.75 0 101.06 1.061l1.591-1.59zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 10-1.061 1.06l1.59 1.591zM12 18a.75.75 0 01.75.75V21a.75.75 0 01-1.5 0v-2.25A.75.75 0 0112 18zM7.758 17.303a.75.75 0 00-1.061-1.06l-1.591 1.59a.75.75 0 001.06 1.061l1.591-1.59zM6 12a.75.75 0 01-.75.75H3a.75.75 0 010-1.5h2.25A.75.75 0 016 12zM6.697 7.757a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 00-1.061 1.06l1.59 1.591z"/>
          </svg>
        }
      </button>
    </div>
  </nav>

<main>
  <router-outlet></router-outlet>
</main>
<app-footer></app-footer>
<app-scroll-to-top></app-scroll-to-top>
