<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>EMDROC Travel &amp; Tours | Premium Corporate Travel Advisory</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }
  </style>
  <style>
    .init-preloader {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: #f8fafc;
    }
    .init-preloader__content {
      display: flex; flex-direction: column; align-items: center; gap: 24px;
    }
    .init-preloader__logo {
      display: flex; align-items: center; justify-content: center;
    }
    .init-preloader__logo-image {
      width: 96px;
      height: auto;
      display: block;
    }
    .init-preloader__brand {
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 24px; font-weight: 800; letter-spacing: 0.15em;
      color: #0097B2;
      margin-top: 12px;
    }
    .init-preloader__bar {
      width: 200px; height: 2px;
      background: rgba(102,213,241,0.15); border-radius: 2px; overflow: hidden;
    }
    .init-preloader__bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #66d5f1, #0097B2);
      border-radius: 2px;
      animation: initFill 1.5s ease-in-out forwards;
    }
    @keyframes initFill {
      0% { width: 0%; }
      50% { width: 60%; }
      100% { width: 100%; }
    }
    .init-preloader__tagline {
      font-family: 'Inter', sans-serif;
      font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(189,200,205,0.5); margin-top: 4px;
    }
  </style>
</head>
<body>
  <script>
    (function() {
      var theme = localStorage.getItem('emdroc-theme');
      var light = theme !== 'dark';
      if (light) {
        document.documentElement.classList.add('light-mode');
        document.body.classList.add('light-mode');
      }
    })();
  </script>
  <app-root>
    <div class="init-preloader">
      <div class="init-preloader__content">
        <div class="init-preloader__logo">
          <img src="logo.png" alt="EMDROC Logo" class="init-preloader__logo-image" />
        </div>
        <div class="init-preloader__bar">
          <div class="init-preloader__bar-fill"></div>
        </div>
        <p class="init-preloader__tagline">Premium Corporate Travel Advisory</p>
      </div>
    </div>
  </app-root>
</body>
</html>
