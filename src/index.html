<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>EMDROC Travel &amp; Tours | Premium Corporate Travel Advisory</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }
  </style>
  <style>
    .init-preloader {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: #f8fafc;
    }
    .init-preloader__content {
      display: flex; flex-direction: column; align-items: center; gap: 24px;
    }
    .init-preloader__logo {
      display: flex; align-items: center; justify-content: center;
    }
    .init-preloader__logo-image {
      width: 160px;
      height: auto;
      display: block;
      animation: initHeartbeat 1.2s ease-in-out infinite;
    }
    .init-preloader__brand {
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 24px; font-weight: 800; letter-spacing: 0.15em;
      color: #0097B2;
      margin-top: 12px;
    }
    @keyframes initHeartbeat {
      0% { transform: scale(1); }
      25% { transform: scale(1.08); }
      50% { transform: scale(1); }
      75% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    .init-preloader__tagline {
      font-family: 'Inter', sans-serif;
      font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase;
      color: #64748b; margin-top: 4px;
    }
  </style>
</head>
<body>
  <script>
    (function() {
      var theme = localStorage.getItem('emdroc-theme');
      var light = theme !== 'dark';
      if (light) {
        document.documentElement.classList.add('light-mode');
        document.body.classList.add('light-mode');
      }
    })();
  </script>
  <app-root>
    <div class="init-preloader">
      <div class="init-preloader__content">
        <div class="init-preloader__logo">
          <img src="logo.png" alt="EMDROC Logo" class="init-preloader__logo-image" />
        </div>
        <p class="init-preloader__tagline">Premium Corporate Travel Advisory</p>
      </div>
    </div>
    <script>
      (function() {
        var preloader = document.querySelector('.init-preloader');
        if (preloader) {
          setTimeout(function() {
            preloader.style.transition = 'opacity 0.4s ease';
            preloader.style.opacity = '0';
            setTimeout(function() {
              preloader.style.display = 'none';
            }, 400);
          }, 2500);
        }
      })();
    </script>
  </app-root>
</body>
</html>
